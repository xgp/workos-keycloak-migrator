services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/phasetwo/phasetwo-keycloak:26.5.7
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_URL: http://localhost:8080
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      # Extension config — override at compose-up time as needed.
      # `realms` is opt-in: defaults to none. Set to a comma-separated allowlist or `*` for all.
      KC_SPI_REALM_RESTAPI_EXTENSION_WORKOS_WEBHOOK_REALMS: "${WORKOS_MIGRATION_REALMS:-migrate-target}"
      KC_SPI_REALM_RESTAPI_EXTENSION_WORKOS_WEBHOOK_API_KEY: "${WORKOS_API_KEY:-}"
      KC_SPI_REALM_RESTAPI_EXTENSION_WORKOS_WEBHOOK_WEBHOOK_BASE_URL: "${WORKOS_WEBHOOK_BASE_URL:-http://localhost:8080}"
      KC_SPI_REALM_RESTAPI_EXTENSION_WORKOS_LEGACY_REALMS: "${WORKOS_MIGRATION_REALMS:-migrate-target}"
      KC_SPI_REALM_RESTAPI_EXTENSION_WORKOS_LEGACY_API_KEY: "${WORKOS_API_KEY:-}"
      KC_SPI_REALM_RESTAPI_EXTENSION_WORKOS_LEGACY_CLIENT_ID: "${WORKOS_CLIENT_ID:-}"
      KC_SPI_REALM_RESTAPI_EXTENSION_WORKOS_LEGACY_CLIENT_SECRET: "${WORKOS_CLIENT_SECRET:-}"
    ports:
      - "8080:8080"
    volumes:
      - ./extensions/webhook-listener/target/workos-webhook-listener.jar:/opt/keycloak/providers/workos-webhook-listener.jar
      - ./extensions/slow-migration/target/workos-slow-migration.jar:/opt/keycloak/providers/workos-slow-migration.jar
      - ./extensions/lib/keycloak-rest-provider-6.2.1.jar:/opt/keycloak/providers/keycloak-rest-provider.jar
    command:
      - start-dev
      - --features=organization

volumes:
  pgdata:
