      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationChallengeVerifyResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: The error code identifying the type of error.
                    example: one_time_code_too_many_attempts
                    const: one_time_code_too_many_attempts
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: Request could not be processed.
                required:
                  - code
                  - message
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
      summary: Verify Challenge
      tags:
        - multi-factor-auth.challenges
  /auth/factors/enroll:
    post:
      description: >-
        Enrolls an Authentication Factor to be used as an additional factor of
        authentication. The returned ID should be used to create an
        authentication Challenge.
      operationId: AuthenticationFactorsController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum:
                    - generic_otp
                    - sms
                    - totp
                  description: The type of factor to enroll.
                  example: totp
                phone_number:
                  type: string
                  description: Required when type is 'sms'.
                  example: '+15555555555'
                totp_issuer:
                  type: string
                  description: Required when type is 'totp'.
                  example: Foo Corp
                totp_user:
                  type: string
                  description: Required when type is 'totp'.
                  example: alan.turing@example.com
                user_id:
                  type: string
                  description: The ID of the user to associate the factor with.
                  example: user_01E4ZCR3C56J083X43JQXF3JK5
              required:
                - type
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticationFactorEnrolled'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
      summary: Enroll Factor
      tags:
        - multi-factor-auth
