      summary: Create a Webhook Endpoint
      tags:
        - webhooks
  /webhook_endpoints/{id}:
    patch:
      description: Update the properties of an existing webhook endpoint.
      operationId: WebhookEndpointsController_update
      parameters:
        - name: id
          required: true
          in: path
          description: Unique identifier of the Webhook Endpoint.
          schema:
            type: string
            example: we_0123456789
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookEndpointDto'
      responses:
        '200':
          description: Webhook endpoint updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpointJson'
        '404':
          description: Webhook endpoint not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: The error code identifying the type of error.
                    example: entity_not_found
                    const: entity_not_found
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: Request could not be processed.
                required:
                  - code
                  - message
        '409':
          description: A Webhook Endpoint with the same endpoint URL already exists.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: The error code identifying the type of error.
                    example: duplicate_endpoint
                    const: duplicate_endpoint
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: Request could not be processed.
                required:
                  - code
                  - message
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      code:
                        type: string
                        description: The error code identifying the type of error.
                        example: invalid_url
                        const: invalid_url
                      message:
                        type: string
                        description: A human-readable description of the error.
                        example: Request could not be processed.
                    required:
                      - code
                      - message
                  - type: object
                    properties:
                      code:
                        type: string
                        description: The error code identifying the type of error.
                        example: invalid_request_parameters
                        const: invalid_request_parameters
                      message:
                        type: string
                        description: A human-readable description of the error.
                        example: Validation failed.
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            code:
                              type: string
                              description: The validation error code.
                              example: unknown_event_type
                            message:
                              type: string
                              description: >-
                                A human-readable description of the validation
                                error.
                              example: Invalid enum value.
                          required:
                            - code
                            - message
                        description: The list of validation errors.
                    required:
                      - code
                      - message
                      - errors
      summary: Update a Webhook Endpoint
      tags:
        - webhooks
    delete:
      description: Delete an existing webhook endpoint.
      operationId: WebhookEndpointsController_delete
      parameters:
        - name: id
          required: true
          in: path
          description: Unique identifier of the Webhook Endpoint.
          schema:
            type: string
            example: we_0123456789
      responses:
        '204':
          description: Webhook endpoint deleted successfully.
        '404':
          description: Webhook endpoint not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: The error code identifying the type of error.
                    example: entity_not_found
                    const: entity_not_found
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: Request could not be processed.
                required:
                  - code
                  - message
      summary: Delete a Webhook Endpoint
      tags:
        - webhooks
  /widgets/token:
    post:
      description: >-
        Generate a widget token scoped to an organization and user with the
        specified scopes.
      operationId: WidgetsPublicController_issueWidgetSessionToken
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
