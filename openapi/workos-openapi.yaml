  /user_management/authorize:
    get:
      description: >-
        Generates an OAuth 2.0 authorization URL to authenticate a user with
        AuthKit or SSO.
      operationId: UserlandSsoController_authorize
      parameters:
        - name: code_challenge_method
          required: false
          in: query
          schema:
            type: string
            example: S256
            const: S256
          description: >-
            The only valid PKCE code challenge method is `"S256"`. Required when
            specifying a `code_challenge`.
        - name: code_challenge
          required: false
          in: query
          schema:
            type: string
            example: E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM
          description: >-
            Code challenge derived from the code verifier used for the PKCE
            flow.
        - name: domain_hint
          required: false
          in: query
          schema:
            type: string
            example: example.com
          description: A domain hint for SSO connection lookup.
        - name: connection_id
          required: false
          in: query
          schema:
            type: string
            example: conn_01EHQMYV6MBK39QC5PZXHY59C3
          description: The ID of an SSO connection to use for authentication.
        - name: provider_query_params
          required: false
          in: query
          schema:
            type: object
            additionalProperties:
              type: string
            example:
              hd: example.com
              access_type: offline
          description: Key/value pairs of query parameters to pass to the OAuth provider.
        - name: provider_scopes
          required: false
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
            example:
              - openid
              - profile
              - email
          description: Additional OAuth scopes to request from the identity provider.
        - name: invitation_token
          required: false
          in: query
          schema:
            type: string
            example: inv_token_abc123
          description: >-
            A token representing a user invitation to redeem during
            authentication.
        - name: screen_hint
          required: false
          in: query
          schema:
            type: string
            enum:
              - sign-up
              - sign-in
            default: sign-in
            example: sign-in
          description: >-
            Used to specify which screen to display when the provider is
            `authkit`.
        - name: login_hint
          required: false
          in: query
          schema:
            type: string
            example: user@example.com
          description: >-
            A hint to the authorization server about the login identifier the
            user might use.
        - name: provider
          required: false
          in: query
          schema:
            type: string
            enum:
              - authkit
              - AppleOAuth
              - BitbucketOAuth
              - GitHubOAuth
              - GitLabOAuth
              - GoogleOAuth
              - IntuitOAuth
              - LinkedInOAuth
              - MicrosoftOAuth
              - SalesforceOAuth
              - SlackOAuth
              - VercelMarketplaceOAuth
              - VercelOAuth
              - XeroOAuth
            example: GoogleOAuth
          description: >-
            The OAuth provider to authenticate with (e.g., GoogleOAuth,
            MicrosoftOAuth, GitHubOAuth).
        - name: prompt
          required: false
          in: query
          schema:
            type: string
            example: login
          description: Controls the authentication flow behavior for the user.
        - name: state
          required: false
          in: query
          schema:
            type: string
            example: eyJyZXR1cm5UbyI6ICIvZGFzaGJvYXJkIn0=
          description: >-
            An opaque value used to maintain state between the request and the
            callback.
        - name: organization_id
          required: false
          in: query
          schema:
            type: string
            example: org_01EHQMYV6MBK39QC5PZXHY59C3
          description: The ID of the organization to authenticate the user against.
        - name: response_type
          required: true
          in: query
          schema:
            type: string
            example: code
            const: code
          description: The response type of the application.
        - name: redirect_uri
          required: true
          in: query
          schema:
            type: string
            format: uri
            example: https://example.com/callback
          description: >-
            The callback URI where the authorization code will be sent after
            authentication.
        - name: client_id
          required: true
          in: query
          schema:
            type: string
            example: client_01HZBC6N1EB1ZY7KG32X
          description: The unique identifier of the WorkOS environment client.
      responses:
        '200':
          headers:
            location:
              schema:
                type: string
                format: uri
          description: OK
        '302':
          headers:
            location:
              schema:
                type: string
                format: uri
          description: ''
      security: []
      summary: Get an authorization URL
      tags:
        - user-management.authentication
  /user_management/authorize/device:
    post:
      description: >-
        Initiates the CLI Auth flow by requesting a device code and verification
        URLs. This endpoint implements the OAuth 2.0 Device Authorization Flow
        ([RFC 8628](https://datatracker.ietf.org/doc/html/rfc8628)) and is
        designed for command-line applications or other devices with limited
        input capabilities.
      operationId: UserlandSsoController_deviceAuthorization
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  description: The WorkOS client ID for your application.
                  example: client_01HZBC6N1EB1ZY7KG32X
              required:
                - client_id
      responses:
        '200':
          description: Device authorization response with codes and verification URI.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceAuthorizationResponse'
        '400':
          description: Invalid request parameters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error code.
                    example: invalid_client
                  error_description:
                    type: string
                    description: Human-readable error description.
                    example: Unknown client
                required:
                  - error
                  - error_description
        '403':
          description: Feature not enabled for team.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error code.
                    example: access_denied
                  error_description:
                    type: string
                    description: Human-readable error description.
                    example: Device authorization grant is not enabled for this team
                required:
                  - error
                  - error_description
      security: []
      summary: Get device authorization URL
      tags:
        - user-management.authentication
  /user_management/cors_origins:
    post:
      description: >-
        Creates a new CORS origin for the current environment. CORS origins
        allow browser-based applications to make requests to the WorkOS API.
      operationId: CorsOriginsController_createCorsOrigin
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCorsOriginDto'
      responses:
        '201':
          description: CORS origin created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorsOriginResponse'
        '409':
          description: Duplicate CORS origin.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: The error code.
                    example: duplicate_cors_origin
                  message:
                    type: string
                    description: A human-readable error message.
                    example: CORS origin already exists.
        '422':
          description: Validation error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable error message.
                    example: Validation failed.
                  errors:
                    type: array
                    description: The list of validation errors.
                    items:
                      type: object
                      properties:
                        property:
                          type: string
                          description: The property that failed validation.
                          example: origin
                        constraints:
                          type: object
      summary: Create a CORS origin
      tags:
        - user-management.cors-origins
