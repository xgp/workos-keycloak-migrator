        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditLogSchemaDto'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogSchemaJson'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
      summary: Create Schema
      tags:
        - audit-logs
    get:
      description: >-
        Get a list of all schemas for the Audit Logs action identified by
        `:name`.
      operationId: AuditLogValidatorVersionsController_schemas
      parameters:
        - name: actionName
          required: true
          in: path
          description: The name of the Audit Log action.
          schema:
            example: user.logged_in
            type: string
        - name: before
          required: false
          in: query
          description: >-
            An object ID that defines your place in the list. When the ID is not
            present, you are at the end of the list.
          schema:
            example: obj_1234567890
            type: string
        - name: after
          required: false
          in: query
          description: >-
            An object ID that defines your place in the list. When the ID is not
            present, you are at the end of the list.
          schema:
            example: obj_1234567890
            type: string
        - name: limit
          required: false
          in: query
          description: >-
            Upper limit on the number of objects to return, between `1` and
            `100`.
          schema:
            minimum: 1
            maximum: 100
            default: 10
            example: 10
            type: integer
        - name: order
          required: false
          in: query
          description: Order the results by the creation time.
          schema:
            $ref: '#/components/schemas/PaginationOrder'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      object:
                        type: string
                        description: Indicates this is a list response.
                        const: list
                      list_metadata:
                        type: object
                        properties:
                          before:
                            type:
                              - string
                              - 'null'
                            description: >-
                              An object ID that defines your place in the list.
                              When the ID is not present, you are at the start
                              of the list.
                            example: als_01HXYZ123456789ABCDEFGHIJ
                          after:
                            type:
                              - string
                              - 'null'
                            description: >-
                              An object ID that defines your place in the list.
                              When the ID is not present, you are at the end of
                              the list.
                            example: als_01HXYZ987654321KJIHGFEDCBA
                        required:
                          - before
                          - after
                        description: >-
                          Pagination cursors for navigating between pages of
                          results.
                  - type: object
                    properties:
                      data:
                        type: array
                        description: The list of records for the current page.
                        items:
                          $ref: '#/components/schemas/AuditLogSchemaJson'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
      summary: List Schemas
      tags:
        - audit-logs
  /audit_logs/events:
    post:
      description: >-
        Create an Audit Log Event.


        This API supports idempotency which guarantees that performing the same
        operation multiple times will have the same result as if the operation
        were performed only once. This is handy in situations where you may need
        to retry a request due to a failure or prevent accidental duplicate
        requests from creating more than one resource.


        To achieve idempotency, you can add `Idempotency-Key` request header to
        a Create Event request with a unique string as the value. Each
        subsequent request matching this unique string will return the same
        response. We suggest using [v4
        UUIDs](https://en.wikipedia.org/wiki/Universally_unique_identifier) for
        idempotency keys to avoid collisions.


        Idempotency keys expire after 24 hours. The API will generate a new
        response if you submit a request with an expired key.
      operationId: AuditLogEventsController_create
      parameters:
        - name: idempotency-key
          in: header
          description: >-
            A unique string to prevent duplicate requests. Each subsequent
            request matching this unique string will return the same response.
            We suggest using v4 UUIDs. Keys expire after 24 hours.
          required: false
          schema:
            type: string
            example: 884793cd-bef4-46cf-8790-e3d4957a09ce
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditLogEventIngestionDto'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogEventCreateResponse'
              example:
                success: true
          description: OK
        '400':
          content:
            application/json:
              schema:
                anyOf:
                  - type: object
                    properties:
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            instancePath:
                              type: string
                              description: >-
                                The JSON path to the invalid field in the event
                                payload.
                              example: /targets
                          required:
                            - instancePath
                        description: The list of validation errors.
                      message:
                        type: string
                        description: A human-readable description of the error.
                        example: Invalid Audit Log event.
                      code:
                        type: string
                        description: The error code identifying the type of error.
                        example: invalid_audit_log_event
                    required:
                      - errors
                      - message
                      - code
                  - type: object
                    properties:
                      message:
                        type: string
                        description: A human-readable description of the error.
                        example: >-
                          Organization not found:
                          'org_01EHQMYV6MBK39QC5PZXHY59C3'.
                    required:
                      - message
              example:
                message: Invalid Audit Log event.
                code: invalid_audit_log_event
                errors:
                  - instancePath: /targets
          description: Bad Request
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
              example:
                message: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
          description: Not Found
        '422':
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: The validation error code.
                          example: required
                        field:
                          type: string
                          description: The field that failed validation.
                          example: event.action
                      required:
                        - code
                        - field
                    description: The list of validation errors.
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: Validation failed.
                required:
                  - errors
                  - message
              example:
                message: Validation failed.
                errors:
                  - code: required
                    field: event.action
          description: Unprocessable Entity
        '429':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: Too many requests.
                  code:
                    type: string
                    description: The error code identifying the type of error.
                    example: rate_limit_exceeded
                required:
                  - message
                  - code
              example:
                message: Too many requests.
                code: rate_limit_exceeded
          description: ''
      summary: Create Event
      tags:
        - audit-logs
  /audit_logs/exports:
    post:
      description: >-
        Create an Audit Log Export. Exports are scoped to a single organization
        within a specified date range.
      operationId: AuditLogExportsController_exports
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditLogExportCreationDto'
      responses:
        '201':
          description: The created Audit Log Export object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogExportJson'
              example:
                object: audit_log_export
                id: audit_log_export_01GBZK5MP7TD1YCFQHFR22180V
                state: pending
                created_at: '2022-09-02T17:14:57.094Z'
                updated_at: '2022-09-02T17:14:57.094Z'
        '400':
          description: Invalid request parameters or date range.
          content:
            application/json:
              schema:
                anyOf:
                  - type: object
                    properties:
                      message:
                        type: string
                        description: A human-readable description of the error.
                        example: >-
                          Organization not found:
                          'org_01EHQMYV6MBK39QC5PZXHY59C3'.
                    required:
                      - message
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          type: string
                        description: >-
                          A list of human-readable error messages describing the
                          validation failures.
                        example:
                          - Invalid date range
                      error:
                        type: string
                        description: The error type.
                        example: Bad Request
                    required:
                      - message
                      - error
              example:
                message: Invalid date range
                code: invalid_audit_log_export_range_date
      summary: Create Export
      tags:
        - audit-logs
  /audit_logs/exports/{auditLogExportId}:
    get:
      description: >-
        Get an Audit Log Export. The URL will expire after 10 minutes. If the
        export is needed again at a later time, refetching the export will
        regenerate the URL.
      operationId: AuditLogExportsController_export
      parameters:
        - name: auditLogExportId
          required: true
          in: path
          description: The unique ID of the Audit Log Export.
          schema:
            type: string
            example: audit_log_export_01GBZK5MP7TD1YCFQHFR22180V
      responses:
        '200':
          description: The Audit Log Export object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogExportJson'
              example:
                object: audit_log_export
                id: audit_log_export_01GBZK5MP7TD1YCFQHFR22180V
                state: ready
                url: https://exports.audit-logs.com/audit-log-exports/export.csv
                created_at: '2022-09-02T17:14:57.094Z'
                updated_at: '2022-09-02T17:14:57.094Z'
        '404':
          description: Audit Log Export not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
              example:
                message: >-
                  Audit Log Export not found:
                  'audit_log_export_01GBZK5MP7TD1YCFQHFR22180V'.
      summary: Get Export
      tags:
        - audit-logs
  /auth/challenges/{id}/verify:
