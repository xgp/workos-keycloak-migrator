    post:
      description: >-
        Fetches a valid OAuth access token for a user's connected account.
        WorkOS automatically handles token refresh, ensuring you always receive
        a valid, non-expired token.
      operationId: DataIntegrationsController_getUserlandUserToken
      parameters:
        - name: slug
