  /radar/attempts:
    post:
      description: Assess a request for risk using the Radar engine and receive a verdict.
      operationId: RadarStandaloneController_assess
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ip_address:
                  type: string
                  description: The IP address of the request to assess.
                  example: 49.78.240.97
                user_agent:
                  type: string
                  description: The user agent string of the request to assess.
                  example: Mozilla/5.0
                email:
                  type: string
                  format: email
                  description: The email address of the user making the request.
                  example: user@example.com
                auth_method:
                  type: string
                  enum:
                    - Password
                    - Passkey
                    - Authenticator
                    - SMS_OTP
                    - Email_OTP
                    - Social
                    - SSO
                    - Other
                  description: The authentication method being used.
                  example: Password
                action:
                  type: string
                  enum:
                    - login
                    - signup
                    - sign-up
                    - sign-in
                    - sign_up
                    - sign_in
                    - sign in
                    - sign up
                  description: The action being performed.
                  example: login
                device_fingerprint:
                  type: string
                  description: An optional device fingerprint for the request.
                  example: fp_abc123
                bot_score:
                  type: string
                  description: An optional bot detection score for the request.
                  example: '0.1'
              required:
                - ip_address
                - user_agent
                - email
                - auth_method
                - action
