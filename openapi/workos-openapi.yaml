openapi: 3.1.1
paths:
  /api_keys/validations:
    post:
      description: Validate an API key value and return the API key object if valid.
      operationId: ApiKeysController_validateApiKey
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateApiKeyDto'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyValidationResponse'
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
      summary: Validate API key
      tags:
        - api_keys
  /api_keys/{id}:
    delete:
      description: >-
        Permanently deletes an API key. This action cannot be undone. Once
        deleted, any requests using this API key will fail authentication.
      operationId: ApiKeysController_delete
      parameters:
        - name: id
          required: true
          in: path
          description: The unique ID of the API key.
          schema:
            type: string
            example: api_key_01EHZNVPK3SFK441A1RGBFSHRT
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
      summary: Delete an API key
      tags:
        - api_keys
  /audit_logs/actions:
    get:
      description: Get a list of all Audit Log actions in the current environment.
      operationId: AuditLogValidatorsController_list
      parameters:
        - name: before
          required: false
          in: query
          description: >-
            An object ID that defines your place in the list. When the ID is not
            present, you are at the end of the list.
          schema:
            example: obj_1234567890
            type: string
        - name: after
          required: false
          in: query
          description: >-
            An object ID that defines your place in the list. When the ID is not
            present, you are at the end of the list.
          schema:
            example: obj_1234567890
            type: string
        - name: limit
          required: false
          in: query
          description: >-
            Upper limit on the number of objects to return, between `1` and
            `100`.
          schema:
            minimum: 1
            maximum: 100
            default: 10
            example: 10
            type: integer
        - name: order
          required: false
          in: query
          description: Order the results by the creation time.
          schema:
            $ref: '#/components/schemas/PaginationOrder'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      object:
                        type: string
                        description: Indicates this is a list response.
                        const: list
                      list_metadata:
                        type: object
                        properties:
                          before:
                            type:
                              - string
                              - 'null'
                            description: >-
                              An object ID that defines your place in the list.
                              When the ID is not present, you are at the start
                              of the list.
                            example: ala_01HXYZ123456789ABCDEFGHIJ
                          after:
                            type:
                              - string
                              - 'null'
                            description: >-
                              An object ID that defines your place in the list.
                              When the ID is not present, you are at the end of
                              the list.
                            example: ala_01HXYZ987654321KJIHGFEDCBA
                        required:
                          - before
                          - after
                        description: >-
                          Pagination cursors for navigating between pages of
                          results.
                  - type: object
                    properties:
                      data:
                        type: array
                        description: The list of records for the current page.
                        items:
                          $ref: '#/components/schemas/AuditLogActionJson'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
      summary: List Actions
      tags:
        - audit-logs
  /audit_logs/actions/{actionName}/schemas:
