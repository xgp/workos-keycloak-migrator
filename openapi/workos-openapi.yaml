                    required:
                      - message
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          type: string
                        description: A list of validation error messages.
                        example:
                          - organization_id must be a string
                      error:
                        type: string
                        description: The error type.
                        example: Bad Request
                    required:
                      - message
                      - error
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
