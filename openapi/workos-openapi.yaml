        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                  description: A [User](/reference/authkit/user) identifier.
                  example: user_01EHZNVPK3SFK441A1RGBFSHRT
                organization_id:
                  type: string
                  description: >-
                    An [Organization](/reference/organization) identifier.
