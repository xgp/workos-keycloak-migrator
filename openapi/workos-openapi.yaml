components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: >-
        Your WorkOS API key prefixed with `sk_`. Pass it as a Bearer token:
        `Authorization: Bearer sk_example_123456789`.
    access_token:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: An SSO access token returned from the Get a Profile and Token endpoint.
  schemas:
    UserObject:
      type: object
      properties:
        id:
          type: string
          description: >-
            Your application's user identifier, which will be stored as an
            [`external_id`](/authkit/metadata/external-identifiers). Used for
            upserting and deduplication.
          example: user_12345
        email:
          type: string
          description: The user's email address.
          example: marcelina.davis@example.com
        first_name:
          type: string
          description: The user's first name.
          example: Marcelina
        last_name:
          type: string
          description: The user's last name.
          example: Davis
        metadata:
          type: object
          description: A set of key-value pairs to attach to the user.
          additionalProperties:
            type: string
            maxLength: 600
          maxProperties: 50
          example:
            department: Engineering
            role: Developer
          propertyNames:
            maxLength: 40
      required:
        - id
        - email
    UserConsentOption:
      type: object
      properties:
        claim:
          type: string
          description: The claim name for this consent option.
          example: tos_accepted
        type:
          type: string
          description: The type of consent option.
          const: enum
        label:
          type: string
          description: A human-readable label for this consent option.
          example: Terms of Service
        choices:
          type: array
          description: The available choices for this consent option.
          items:
            type: object
            properties:
              value:
                type: string
                description: The value of this choice.
                example: accepted
              label:
                type: string
                description: A human-readable label for this choice.
                example: I accept the Terms of Service
          example:
            - value: accepted
              label: I accept the Terms of Service
      required:
        - claim
        - type
        - label
        - choices
    UserManagementLoginRequest:
      type: object
      properties:
        external_auth_id:
          type: string
          description: Identifier provided when AuthKit redirected to your login page.
          example: ext_auth_01HXYZ123456789ABCDEFGHIJ
        user:
          description: The user to create or update in AuthKit.
          $ref: '#/components/schemas/UserObject'
        user_consent_options:
          description: >-
            Array of [User Consent
            Options](/reference/workos-connect/standalone/user-consent-options)
            to store with the session.
          type: array
          items:
            $ref: '#/components/schemas/UserConsentOption'
      required:
        - external_auth_id
        - user
    ValidateApiKeyDto:
      type: object
      properties:
        value:
          type: string
          description: The value for an API key.
          example: sk_example_1234567890abcdef
      required:
        - value
    PaginationOrder:
      type: string
      enum:
        - normal
        - desc
        - asc
      example: desc
      default: desc
    RedirectUriDto:
      type: object
      properties:
        uri:
          type: string
          description: The redirect URI.
          example: https://example.com/callback
        default:
          type:
            - boolean
            - 'null'
          description: Whether this is the default redirect URI.
          example: true
      required:
        - uri
    CreateOAuthApplicationDto:
      type: object
      properties:
        name:
          type: string
          description: The name of the application.
          example: My Application
        application_type:
          type: string
          description: The type of application to create.
          const: oauth
        description:
          type:
            - string
            - 'null'
          description: A description for the application.
          example: An application for managing user access
        scopes:
          description: The OAuth scopes granted to the application.
          example: &ref_1
            - openid
            - profile
            - email
          type:
            - array
            - 'null'
          items:
            type: string
        redirect_uris:
          description: Redirect URIs for the application.
          example:
            - uri: https://example.com/callback
              default: true
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/RedirectUriDto'
        uses_pkce:
          type:
            - boolean
            - 'null'
          description: Whether the application uses PKCE (Proof Key for Code Exchange).
          example: true
        is_first_party:
          type: boolean
          description: >-
            Whether this is a first-party application. Third-party applications
            require an organization_id.
          example: true
        organization_id:
          type:
            - string
            - 'null'
          description: >-
            The organization ID this application belongs to. Required when
            is_first_party is false.
          example: org_01EHZNVPK3SFK441A1RGBFSHRT
      required:
        - name
        - application_type
        - is_first_party
    CreateM2MApplicationDto:
      type: object
      properties:
        name:
          type: string
          description: The name of the application.
          example: My Application
        application_type:
          type: string
          description: The type of application to create.
          const: m2m
        description:
          type:
            - string
            - 'null'
          description: A description for the application.
          example: An application for managing user access
        scopes:
          description: The OAuth scopes granted to the application.
          example: *ref_1
          type:
            - array
            - 'null'
          items:
            type: string
        organization_id:
          type: string
          description: The organization ID this application belongs to.
          example: org_01EHZNVPK3SFK441A1RGBFSHRT
      required:
        - name
        - application_type
        - organization_id
    UpdateOAuthApplicationDto:
      type: object
      properties:
        name:
          type: string
          description: The name of the application.
          example: My Application
        description:
          type:
            - string
            - 'null'
          description: A description for the application.
          example: An application for managing user access
        scopes:
          description: The OAuth scopes granted to the application.
          example:
            - openid
            - profile
            - email
          type:
            - array
            - 'null'
          items:
            type: string
        redirect_uris:
          description: Updated redirect URIs for the application. OAuth applications only.
          example:
            - uri: https://example.com/callback
              default: true
          type:
            - array
            - 'null'
          items:
            $ref: '#/components/schemas/RedirectUriDto'
    CreateApplicationSecretDto:
      type: object
      properties: {}
    AuditLogEventActorDto:
      type: object
      properties:
        id:
          type: string
          description: Actor identifier.
          example: user_TF4C5938
        type:
          type: string
          description: Actor type.
          example: user
        name:
          type: string
          description: Optional actor name.
          example: Jon Smith
        metadata:
          type: object
          description: Additional data associated with the event or entity.
          example:
            owner: user_01GBTCQ2
          maxProperties: 50
          additionalProperties: false
          patternProperties: &ref_2
            ^[a-zA-Z0-9_-]{0,40}$:
              anyOf:
                - type: string
                  maxLength: 500
                - type: number
                - type: boolean
      required:
        - id
        - type
    AuditLogEventTargetDto:
      type: object
      properties:
        id:
          type: string
          description: Target identifier.
          example: user_TF4C5938
        type:
          type: string
          description: Target type.
          example: user
        name:
          type: string
          description: Optional target name.
          example: Jon Smith
        metadata:
          type: object
          description: Additional data associated with the event or entity.
          example:
            owner: user_01GBTCQ2
          maxProperties: 50
          additionalProperties: false
          patternProperties: *ref_2
      required:
        - id
        - type
    AuditLogEventContextDto:
      type: object
      properties:
        location:
          type: string
          description: IP Address or some other geolocation identifier.
          example: 123.123.123.123
        user_agent:
          type: string
          description: User agent string.
          example: Chrome/104.0.0.0
      required:
        - location
    AuditLogEventDto:
      type: object
      properties:
        action:
          type: string
          description: Identifier of what happened.
          example: user.signed_in
        occurred_at:
          type: string
          description: ISO-8601 value of when the action occurred.
          example: '2026-02-02T16:35:39.317Z'
          format: date-time
        actor:
          description: The entity that performed the action.
          $ref: '#/components/schemas/AuditLogEventActorDto'
        targets:
          description: The resources affected by the action.
          type: array
          items:
            $ref: '#/components/schemas/AuditLogEventTargetDto'
        context:
          description: Additional context about where and how the action occurred.
          $ref: '#/components/schemas/AuditLogEventContextDto'
        metadata:
          type: object
          description: Additional data associated with the event or entity.
          example:
            owner: user_01GBTCQ2
          maxProperties: 50
          additionalProperties: false
          patternProperties: *ref_2
        version:
          type: integer
          description: What schema version the event is associated with.
          example: 1
      required:
        - action
        - occurred_at
        - actor
        - targets
        - context
    AuditLogEventIngestionDto:
      type: object
      properties:
        organization_id:
          type: string
          description: The unique ID of the Organization.
          example: org_01EHWNCE74X7JSDV0X3SZ3KJNY
        event:
          description: The audit log event to create.
          $ref: '#/components/schemas/AuditLogEventDto'
      required:
        - organization_id
        - event
    AuditLogExportCreationDto:
      type: object
      properties:
        organization_id:
          type: string
          description: The unique ID of the Organization.
          example: org_01EHZNVPK3SFK441A1RGBFSHRT
        range_start:
          type: string
          description: ISO-8601 value for start of the export range.
          example: '2022-07-02T18:09:06.996Z'
        range_end:
          type: string
          description: ISO-8601 value for end of the export range.
          example: '2022-09-02T18:09:06.996Z'
        actions:
          description: List of actions to filter against.
          example:
            - user.signed_in
          type: array
          items:
            type: string
        actors:
          description: Deprecated. Use `actor_names` instead.
          deprecated: true
          example:
            - Jon Smith
          type: array
          items:
            type: string
        actor_names:
          description: List of actor names to filter against.
          example:
            - Jon Smith
          type: array
          items:
            type: string
        actor_ids:
          description: List of actor IDs to filter against.
          example:
            - user_01GBZK5MP7TD1YCFQHFR22180V
          type: array
          items:
            type: string
        targets:
          description: List of target types to filter against.
          example:
            - team
          type: array
          items:
            type: string
      required:
        - organization_id
        - range_start
        - range_end
    UpdateAuditLogsRetentionDto:
      type: object
      properties:
        retention_period_in_days:
          type: integer
          description: >-
            The number of days Audit Log events will be retained. Valid values
            are `30` and `365`.
          example: 30
      required:
        - retention_period_in_days
    AuditLogSchemaActorDto:
      type: object
      properties:
        metadata:
          type: object
          description: JSON schema for actor metadata.
          example:
            type: object
            properties:
              role:
                type: string
      required:
        - metadata
    AuditLogSchemaTargetDto:
      type: object
      properties:
        type:
          type: string
          description: The type of the target resource.
          example: invoice
        metadata:
          type: object
          description: Optional JSON schema for target metadata.
          example:
            type: object
            properties:
              cost:
                type: number
      required:
        - type
    AuditLogSchemaDto:
      type: object
      properties:
        actor:
          description: The metadata schema for the actor.
          $ref: '#/components/schemas/AuditLogSchemaActorDto'
        targets:
          minItems: 1
          description: The list of targets for the schema.
          type: array
          items:
            $ref: '#/components/schemas/AuditLogSchemaTargetDto'
        metadata:
          type: object
          description: Optional JSON schema for event metadata.
          example:
            type: object
            properties:
              transactionId:
                type: string
      required:
        - targets
    ChallengeAuthenticationFactorDto:
      type: object
      properties:
        sms_template:
          type: string
          description: >-
            A custom template for the SMS message. Use the {{code}} placeholder
