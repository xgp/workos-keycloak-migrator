  /sso/authorize:
    get:
      description: Initiates the single sign-on flow.
      operationId: SsoController_authorize
      parameters:
        - name: provider_scopes
          required: false
          in: query
          description: >-
            Additional scopes to request from the identity provider. Applicable
            when using OAuth or OpenID Connect connections.
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
            example:
              - openid
              - profile
              - email
        - name: provider_query_params
          required: false
          in: query
          description: >-
            Key/value pairs of query parameters to pass to the OAuth provider.
            Only applicable when using OAuth connections.
          schema:
            additionalProperties:
              type: string
            example:
              hd: example.com
              access_type: offline
            type: object
        - name: client_id
          required: true
          in: query
          schema:
            type: string
            example: client_01HZBC6N1EB1ZY7KG32X
          description: The unique identifier of the WorkOS environment client.
        - name: domain
          required: false
          in: query
          deprecated: true
          schema:
            type: string
            example: example.com
          description: >-
            Deprecated. Use `connection` or `organization` instead. Used to
            initiate SSO for a connection by domain. The domain must be
            associated with a connection in your WorkOS environment.
        - name: provider
          required: false
          in: query
          schema:
            type: string
            enum:
              - AppleOAuth
              - BitbucketOAuth
              - GitHubOAuth
              - GitLabOAuth
              - GoogleOAuth
              - IntuitOAuth
              - LinkedInOAuth
              - MicrosoftOAuth
              - SalesforceOAuth
              - SlackOAuth
              - VercelMarketplaceOAuth
              - VercelOAuth
              - XeroOAuth
            example: GoogleOAuth
          description: Used to initiate OAuth authentication with various providers.
        - name: redirect_uri
          required: true
          in: query
          schema:
            type: string
            format: uri
            example: https://example.com/callback
          description: >-
            Where to redirect the user after they complete the authentication
            process. You must use one of the redirect URIs configured via the
            [Redirects](https://dashboard.workos.com/redirects) page on the
            dashboard.
        - name: response_type
          required: true
          in: query
          schema:
            type: string
            example: code
            const: code
          description: >-
            The only valid option for the response type parameter is `"code"`.


            The `"code"` parameter value initiates an [authorization code grant
            type](https://tools.ietf.org/html/rfc6749#section-4.1). This grant
            type allows you to exchange an authorization code for an access
            token during the redirect that takes place after a user has
            authenticated with an identity provider.
        - name: state
          required: false
          in: query
          schema:
            type: string
            example: dj1kUXc0dzlXZ1hjUQ==
          description: >-
            An optional parameter that can be used to encode arbitrary
            information to help restore application state between redirects. If
            included, the redirect URI received from WorkOS will contain the
            exact `state` that was passed.
        - name: connection
          required: false
          in: query
          schema:
            type: string
            example: conn_01E4ZCR3C56J083X43JQXF3JK5
          description: >-
            Used to initiate SSO for a connection. The value should be a WorkOS
            connection ID.


            You can persist the WorkOS connection ID with application user or
            team identifiers. WorkOS will use the connection indicated by the
            connection parameter to direct the user to the corresponding IdP for
            authentication.
        - name: organization
          required: false
          in: query
          schema:
            type: string
            example: org_01EHQMYV6MBK39QC5PZXHY59C3
          description: >-
            Used to initiate SSO for an organization. The value should be a
            WorkOS organization ID.


            You can persist the WorkOS organization ID with application user or
            team identifiers. WorkOS will use the organization ID to determine
            the appropriate connection and the IdP to direct the user to for
            authentication.
        - name: domain_hint
          required: false
          in: query
          schema:
            type: string
            example: example.com
          description: >-
            Can be used to pre-fill the domain field when initiating
            authentication with Microsoft OAuth or with a Google SAML connection
            type.
        - name: login_hint
          required: false
          in: query
          schema:
            type: string
            example: user@example.com
          description: >-
            Can be used to pre-fill the username/email address field of the IdP
            sign-in page for the user, if you know their username ahead of time.
            Currently supported for OAuth, OpenID Connect, Okta, and Entra ID
            connections.
        - name: nonce
          required: false
          in: query
          schema:
            type: string
            example: abc123def456
          description: >-
            A random string generated by the client that is used to mitigate
            replay attacks.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoAuthorizeUrlResponse'
        '302':
          headers:
            Location:
              schema:
                type: string
                format: uri
          description: ''
      security: []
      summary: Initiate SSO
      tags:
        - sso
  /sso/jwks/{clientId}:
    get:
      description: >-
        Returns the JSON Web Key Set (JWKS) containing the public keys used for
        verifying access tokens.
      operationId: SsoController_jsonWebKeySet
      parameters:
        - name: clientId
          required: true
          in: path
          description: >-
            Identifies the application making the request to the WorkOS server.
            You can obtain your client ID from the [API
            Keys](https://dashboard.workos.com/api-keys) page in the dashboard.
          schema:
            type: string
            example: client_01HXYZ123456789ABCDEFGHIJ
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
      summary: Get JWKS
      tags:
        - user-management.session-tokens
  /sso/logout:
    get:
      description: >-
        Logout allows to sign out a user from your application by triggering the
        identity provider sign out flow. This `GET` endpoint should be a
        redirection, since the identity provider user will be identified in the
        browser session.


        Before redirecting to this endpoint, you need to generate a short-lived
        logout token using the [Logout
        Authorize](/reference/sso/logout/authorize) endpoint.
      operationId: SsoController_logout
      parameters:
        - name: token
          required: true
          in: query
          description: >-
            The logout token returned from the [Logout
            Authorize](/reference/sso/logout/authorize) endpoint.
          schema:
            type: string
            example: >-
              eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJwcm9maWxlX2lkIjoicHJvZl8wMUdXUTFHMEgyRk02QVNFRjBIUzEzSENXOS0zMDRrZzAzZyIsImV4cCI6IjE1MTYyMzkwMjIifQ.Wru9Qlnf5DpohtGCKhZU4cVOd3zpiu7QQ-XEX--5A_4
      responses:
        '200':
          description: OK
        '302':
          headers:
            Location:
              schema:
                type: string
                format: uri
          description: ''
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
      security: []
      servers:
        - url: https://auth.workos.com
      summary: Logout Redirect
      tags:
        - sso
  /sso/logout/authorize:
    post:
      description: >-
        You should call this endpoint from your server to generate a logout
        token which is required for the [Logout Redirect](/reference/sso/logout)
        endpoint.
      operationId: SsoController_logoutAuthorize
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profile_id:
                  type: string
                  description: The unique ID of the profile to log out.
                  example: prof_01HXYZ123456789ABCDEFGHIJ
              required:
                - profile_id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoLogoutAuthorizeResponse'
        '201':
          description: Created
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      error:
                        type: string
                        const: connection_invalid
                      error_description:
                        type: string
                        description: A human-readable description of the error.
                        example: >-
                          Single Logout is only supported for GenericOIDC
                          connections.
                    required:
                      - error
                      - error_description
                  - type: object
                    properties:
                      error:
                        type: string
                        const: unauthorized_client
                      error_description:
                        type: string
                        description: A human-readable description of the error.
                        example: Unauthorized
                    required:
                      - error
                      - error_description
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
      servers:
        - url: https://auth.workos.com
      summary: Logout Authorize
      tags:
        - sso
  /sso/profile:
    get:
      description: >-
        Exchange an access token for a user's [Profile](/reference/sso/profile).
        Because this profile is returned in the [Get a Profile and Token
        endpoint](/reference/sso/profile/get-profile-and-token) your application
        usually does not need to call this endpoint. It is available for any
        authentication flows that require an additional endpoint to retrieve a
        user's profile.
      operationId: SsoController_getProfile
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    const: Unauthorized
                required:
                  - error
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
      security:
        - access_token: []
      summary: Get a User Profile
      tags:
        - sso
  /sso/token:
    post:
      description: >-
        Get an access token along with the user
        [Profile](/reference/sso/profile) using the code passed to your
        [Redirect URI](/reference/sso/get-authorization-url/redirect-uri).
      operationId: SsoController_token
      parameters:
        - name: client_id
          required: true
          in: query
          description: The client ID of the WorkOS environment.
          schema:
            example: client_01HZBC6N1EB1ZY7KG32X
            type: string
        - name: client_secret
          required: true
          in: query
          description: The client secret of the WorkOS environment.
          schema:
            example: sk_example_123456789
            type: string
        - name: code
          required: true
          in: query
          description: The authorization code received from the authorization callback.
          schema:
            example: authorization_code_value
            type: string
        - name: grant_type
          required: true
          in: query
          description: The grant type for the token request.
          schema:
            example: authorization_code
            type: string
            const: authorization_code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenQueryDto'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SsoTokenResponse'
        '201':
          description: Created
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      error:
                        type: string
                        const: invalid_client
                      error_description:
                        type: string
                        description: A human-readable description of the error.
                        example: Invalid client ID or secret.
                    required:
                      - error
                      - error_description
                  - type: object
                    properties:
                      error:
                        type: string
                        const: unauthorized_client
                      error_description:
                        type: string
                        description: A human-readable description of the error.
                        example: The client is not authorized to use this grant type.
                    required:
                      - error
                      - error_description
                  - type: object
                    properties:
                      error:
                        type: string
                        const: invalid_grant
                      error_description:
                        type: string
                        description: A human-readable description of the error.
                        example: The code has expired or has already been used.
                    required:
                      - error
                      - error_description
                  - type: object
                    properties:
                      error:
                        type: string
                        const: unsupported_grant_type
                      error_description:
                        type: string
                        description: A human-readable description of the error.
                        example: The grant type is not supported.
                    required:
                      - error
                      - error_description
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: A human-readable description of the error.
                    example: 'Organization not found: ''org_01EHQMYV6MBK39QC5PZXHY59C3''.'
                required:
                  - message
      security: []
      summary: Get a Profile and Token
      tags:
        - sso
